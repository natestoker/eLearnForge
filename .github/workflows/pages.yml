# Build the editor + player and publish dist/ to GitHub Pages on every push
# to main. configure-pages enables the Pages site on first run, so no manual
# repository-settings step is needed.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts skips onnxruntime-node's postinstall, which tries to
      # download a server-side CUDA binary from GitHub releases and fails in
      # CI. It's a transitive dep of kokoro-js (in-browser TTS); the Vite
      # build only bundles the browser ONNX runtime, so the node binary is
      # never needed. esbuild's binary ships as an optional dep, not a script.
      - run: npm ci --ignore-scripts
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
